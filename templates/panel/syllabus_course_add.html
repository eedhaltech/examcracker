{% extends 'panel/base_panel.html' %}
{% block title %}Add Course — {{ syllabus.name }}{% endblock %}
{% block page_title %}Add Course{% endblock %}

{% block content %}
<div class="hl-topbar">
  <nav class="hl-breadcrumb">
    <a href="{% url 'panel_courses' %}">Syllabuses</a>
    <span class="hl-bc-sep">›</span>
    <a href="{% url 'syllabus_courses' syllabus.id %}">{{ syllabus.name }}</a>
    <span class="hl-bc-sep">›</span>
    <span class="hl-bc-current">Add Course</span>
  </nav>
</div>

<div class="panel-card" style="max-width:480px;">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label>Syllabus</label>
      <input type="text" class="panel-input" value="{{ syllabus.name }}" disabled>
    </div>
    <div class="form-group">
      <label>Course Name *</label>
      <input type="text" name="name" class="panel-input" required autofocus placeholder="e.g. Mathematics">
    </div>
    <div class="form-group">
      <label>Display Order</label>
      <input type="number" name="order" value="0" class="panel-input" min="0">
    </div>
    <div class="form-group">
      <label>Icon Image (optional)</label>
      <input type="file" name="icon" accept="image/*" class="panel-input">
    </div>
    <div class="form-actions">
      <button type="submit" class="panel-btn panel-btn--primary">💾 Save Course</button>
      <a href="{% url 'syllabus_courses' syllabus.id %}" class="panel-btn panel-btn--outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
