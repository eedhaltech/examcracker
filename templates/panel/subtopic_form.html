{% extends 'panel/base_panel.html' %}
{% block title %}Add Sub-topic{% endblock %}
{% block page_title %}Add Sub-topic to {{ topic.name }}{% endblock %}

{% block content %}
<div class="panel-card" style="max-width:480px;">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Sub-topic Name *</label>
      <input type="text" name="name" class="panel-input" required autofocus>
    </div>
    <div class="form-group">
      <label>Display Order</label>
      <input type="number" name="order" value="0" class="panel-input" min="0">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary-sm">💾 Add Sub-topic</button>
      <a href="{% url 'panel_topic_detail' topic.id %}" class="btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
