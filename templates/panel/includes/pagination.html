{% if page_obj.has_other_pages %}
<div class="panel-pagination">
  {% if page_obj.has_previous %}
  <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.previous_page_number }}" class="page-btn">← Prev</a>
  {% endif %}

  <span class="page-info">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>

  {% if page_obj.has_next %}
  <a href="?{% if request.GET.urlencode %}{{ request.GET.urlencode }}&{% endif %}page={{ page_obj.next_page_number }}" class="page-btn">Next →</a>
  {% endif %}
</div>
{% endif %}
